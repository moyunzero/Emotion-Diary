appId: com.moyunzero.emotiondiary
---
# 全链路：创建 → 软删 → 回收站 → 永久删除 → 条目消失
- runFlow:
    file: ../subflows/seed-recycle-bin.yaml
    env:
      ENTRY_CONTENT: "Maestro E2E 回收站永久删除测试"
- tapOn:
    id: recycle-purge-button
# RN Alert 无 testID；cancel=index 0，destructive confirm=index 1（永久删除 / Delete permanently）
- extendedWaitUntil:
    visible: "取消"
    timeout: 5000
- tapOn:
    index: 1
- extendedWaitUntil:
    notVisible: "取消"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: recycle-bin-empty-state
    timeout: 10000
