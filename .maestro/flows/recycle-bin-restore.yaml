appId: com.moyunzero.emotiondiary
---
# 全链路：创建 → 软删 → 回收站 → 恢复 → 气象站可见
- runFlow:
    file: ../subflows/seed-recycle-bin.yaml
    env:
      ENTRY_CONTENT: "Maestro E2E 回收站恢复测试"
- tapOn:
    id: recycle-restore-button
# RN Alert 无 testID；cancel=index 0，confirm=index 1（恢复 / Restore）
- extendedWaitUntil:
    visible: "取消"
    timeout: 5000
- tapOn:
    index: 1
- extendedWaitUntil:
    notVisible: "取消"
    timeout: 10000
- runFlow:
    file: ../subflows/open-url.yaml
    env:
      URL: emotiondiary://
- extendedWaitUntil:
    visible:
      id: dashboard-header
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: mood-entry-card
    timeout: 15000
- runFlow:
    file: ../subflows/open-url.yaml
    env:
      URL: emotiondiary://recycle-bin
- extendedWaitUntil:
    visible:
      id: recycle-bin-empty-state
    timeout: 10000
