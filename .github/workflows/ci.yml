name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn lint

  governance:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn verify:governance
      - run: node scripts/verify-governance-smoke.js
